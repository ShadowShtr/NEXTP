<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Market category icon</title>
  <desc id="desc">Market category icon - SVG asset for NextP</desc>

  <defs>
    <linearGradient id="tileBlue" x1="80" y1="40" x2="440" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D7FF"/>

  <rect x="48" y="48" width="416" height="416" rx="92" fill="url(#tileWhite)" filter="url(#softShadow)"/>
  <path d="M160 194h242l-34 128c-7 26-30 44-57 44H206c-27 0-50-18-57-44l-28-106" stroke="url(#blueClay)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#smallShadow)"/>
  <circle cx="214" cy="396" r="24" fill="url(#deepBlueClay)"/>
  <circle cx="326" cy="396" r="24" fill="url(#deepBlueClay)"/>
  <circle cx="218" cy="238" r="22" fill="url(#greenClay)"/>
  <circle cx="282" cy="238" r="22" fill="url(#coinClay)"/>
  <circle cx="346" cy="238" r="22" fill="url(#pinkClay)"/>


<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NextP summary charts background</title>
  <desc id="desc">NextP background</desc>
  <defs>
    <linearGradient id="bgBlue" x1="0" y1="0" x2="1080" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D7FF"/>
      <stop offset="0.35" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="heroBlue" x1="0" y1="0" x2="1080" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#006DFF"/>
      <stop offset="1" stop-color="#72D7FF"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0" stop-color="#FFF2A8"/><stop offset="0.55" stop-color="#FDB022"/><stop offset="1" stop-color="#F79009"/>
    </linearGradient>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#006DFF" flood-opacity="0.18"/>
    </filter>
  </defs>
  
  <rect width="1080" height="1920" fill="#F7FBFF"/>
  <circle cx="800" cy="220" r="42" fill="url(#coin)" filter="url(#shadow)"/>
  <circle cx="900" cy="180" r="30" fill="url(#coin)" filter="url(#shadow)"/>
  <path d="M130 380c100 90 270 100 390 0s268-98 410 12" stroke="#72D7FF" stroke-width="24" stroke-linecap="round" opacity="0.26"/>
  <rect x="90" y="500" width="900" height="330" rx="74" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="315" cy="665" r="112" fill="#006DFF" opacity="0.18"/>
  <circle cx="315" cy="665" r="70" fill="#F7FBFF"/>
  <rect x="620" y="595" width="62" height="170" rx="31" fill="#B8D7FF"/>
  <rect x="720" y="555" width="62" height="210" rx="31" fill="#006DFF"/>
  <rect x="820" y="625" width="62" height="140" rx="31" fill="#72D7FF"/>
  <circle cx="930" cy="1450" r="220" fill="#006DFF" opacity="0.08" filter="url(#blurSoft)"/>

</svg>
